                <div class="endereco">
                    <p><b>Endereço</b></p>
                    <input class="campo_1" type="text" placeholder="Rua, número, bairro, cidade - UF">
                </div>
            </div>

            
            <div class="email_endereco">
                <div class="email">
                    <p><b>Idade</b></p>
                    <input class="campo_1" type="number" placeholder="Ex:30">
                </div>

                <div class="endereco">
                    <p><b>Tempo de experiência</b></p>
                    <input class="campo_1" type="text" placeholder="Ex:15 anos">
                </div>
            </div>
