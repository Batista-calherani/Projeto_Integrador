<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/formulario_profissional.css">
</head>

<body>


    <div class="cor_fundo">
        <div class="titulo">
            <h1>Contratar <span>profissionais</span></h1>
            <p>Preencha os dados abaixo para solicitar a contratação deste Profissional</p>
        </div>

        <div class="botao_sair">
            <div class="sair">
                <a href="login.html"><h3>Sair</h3></a>
            </div>
        </div>

        <div class="form">
            <h1>Envie suas <span>informações</span></h1>
            <div class="nome_telefone">
                <div class="nome">
                    <p><b>Nome completo</b></p>
                    <input class="campo_1" type="text" placeholder="Digite seu nome completo">
                </div>

                <div class="telefone">
                    <p><b>Telefone</b></p>
                    <input class="campo_1" type="number" placeholder="(11) 99999-9999">
                </div>
            </div>

            <div class="email_endereco">
                <div class="email">
                    <p><b>E-mail</b></p>
                    <input class="campo_1" type="email" placeholder="exemplo@email.com">
                </div>

                <div class="endereco">
                    <p><b>Endereço</b></p>
                    <input class="campo_1" type="text" placeholder="Rua, número, bairro, cidade - UF">
                </div>
            </div>


            <div class="email_endereco">
                <div class="email">
                    <p><b>Idade</b></p>
                    <input class="campo_1" type="number" placeholder="Ex:30">
                </div>

                <div class="endereco">
                    <p><b>Tempo de experiência</b></p>
                    <input class="campo_1" type="text" placeholder="Ex:15 anos">
                </div>
            </div>

            <div class="email_endereco">
                <div class="email">
                    <p><b>Cargos</b></p>
                    <select class="campo_1" type="servicos" placeholder="Ex:30">
                        <option selected disabled>
                            Escolha sua área
                        </option>
                        <option value="">Servente</option>
                        <option value="">Pedreiro</option>
                        <option value="">Mestre de Obra</option>
                    </select>
                </div>

                <div class="endereco">
                    <p><b>Salário</b></p>
                    <input class="campo_1" type="text" placeholder="Ex:1500">
                </div>
            </div>


            <div class="Descricao">
                <p><b>Biografia</b></p>
                <textarea class="servico" name="" id="" placeholder="Nós fale um pouco sobre você"></textarea>
            </div>



            <div class="botao">
                <button class="servico_">
                    <img src="../Img/select.png" alt="">
                    <p>Confirmar contratação</p>
                </button>
            </div>

             <div class="botao">
                <button class="servico_">
                    <img src="../Img/select.png" alt="">
                    <p>Confirmar contratação</p>
                </button>
            </div>


        </div>

    </div>
    

</body>

</html>
